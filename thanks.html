<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,follow">
<meta name="theme-color" content="#ff004d">
<title>メール送信完了｜アップルワールド羽村店</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap">
<link rel="stylesheet" href="assets/css/style.css">
<style>
body{padding-top:0;background:#f5f5f5}
.thanks{min-height:100vh;display:grid;place-items:center;padding:40px 18px;background:linear-gradient(180deg,#fff 0%,#f5f5f5 100%)}
.thanks__box{width:100%;max-width:680px;background:#fff;border:1px solid #e3e3e3;border-radius:14px;padding:36px 22px;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.08)}
.thanks__logo{height:84px;width:auto;margin:0 auto 16px;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.08)}
.thanks__title{font-size:1.75rem;font-weight:900;line-height:1.45;color:#ff004d;margin-bottom:14px}
.thanks__text{color:#666;font-weight:700;margin-bottom:24px}
.thanks__actions{display:flex;flex-direction:column;gap:12px;align-items:center}.thanks__actions .btn{width:100%;max-width:340px}
@media(min-width:768px){.thanks__box{padding:48px}.thanks__title{font-size:2.25rem}.thanks__actions{flex-direction:row;justify-content:center}.thanks__actions .btn{width:auto}}
</style>
</head>
<body>
<main class="thanks">
  <section class="thanks__box" aria-labelledby="thanks-title">
    <img src="assets/images/logo.png" alt="アップルワールド羽村店" class="thanks__logo" width="220" height="154">
    <h1 class="thanks__title" id="thanks-title">メールは送信されました！</h1>
    <p class="thanks__text">お問い合わせありがとうございます。内容を確認後、担当者よりご連絡いたします。</p>
    <div class="thanks__actions">
      <a href="./" class="btn btn--form">トップページへ戻る</a>
      <a href="tel:0425334750" class="btn btn--tel">電話で相談する</a>
    </div>
  </section>
</main>
</body>
</html>
